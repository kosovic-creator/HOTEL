<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M-HOTEL Logo to Favicon</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }
    .logo-display {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }
    .original-logo {
      font-size: 24px;
      font-weight: bold;
    }
    .favicon-preview {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .favicon-size {
      width: 64px;
      height: 64px;
      border: 1px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      margin: 5px;
    }
    .size-16 { width: 16px; height: 16px; font-size: 10px; }
    .size-32 { width: 32px; height: 32px; font-size: 16px; }
    .size-48 { width: 48px; height: 48px; font-size: 20px; }
    .size-64 { width: 64px; height: 64px; font-size: 24px; }

    .favicon-icon {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #DC2626;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="logo-display">
    <h1>M-HOTEL Logo Conversion</h1>

    <div class="original-logo">
      <span>⭕️ </span>
      <span style="color: black;">M-HOTEL</span>
      <span style="color: #DC2626;"> Admin</span>
    </div>

    <h2>Favicon Previews (different sizes)</h2>

    <div class="favicon-preview">
      <div>
        <div>16x16px</div>
        <div class="favicon-size size-16">
          <div class="favicon-icon">M</div>
        </div>
      </div>

      <div>
        <div>32x32px</div>
        <div class="favicon-size size-32">
          <div class="favicon-icon">M</div>
        </div>
      </div>

      <div>
        <div>48x48px</div>
        <div class="favicon-size size-48">
          <div class="favicon-icon">M</div>
        </div>
      </div>

      <div>
        <div>64x64px</div>
        <div class="favicon-size size-64">
          <div class="favicon-icon">M</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
